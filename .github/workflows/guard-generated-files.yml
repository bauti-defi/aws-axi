name: Guard generated files

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: guard-generated-files-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    name: Generated files must not be hand-edited
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Regenerate skills/aws-axi/SKILL.md and compare bytes
        run: |
          set -eu
          bun run build:skill
          if ! git diff --exit-code skills/aws-axi/SKILL.md; then
            {
              echo "::error::skills/aws-axi/SKILL.md content differs from what \`bun run build:skill\` produces."
              echo
              echo "The committed file appears to be hand-edited. Edit src/skill.ts instead,"
              echo "then run \`bun run build:skill\` to regenerate."
            } >&2
            exit 1
          fi
          echo "skills/aws-axi/SKILL.md matches generator output. OK."
