name: Guard generated files

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: guard-generated-files-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    name: Generated files must not be hand-edited
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history on both sides of the merge-base so `git diff base...head`
          # reflects exactly what GitHub shows as "Files changed".
          fetch-depth: 0

      - name: Check PR does not hand-edit generated skill file
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -eu
          files=$(git diff --name-only "${BASE_SHA}...${HEAD_SHA}")

          violated=""
          for path in skills/aws-axi/SKILL.md; do
            if printf '%s\n' "$files" | grep -qxF -- "$path"; then
              violated="${violated} ${path}"
            fi
          done

          if [ -n "$violated" ]; then
            {
              echo "::error::This PR hand-edits generated files:${violated}"
              echo
              echo "skills/aws-axi/SKILL.md is auto-generated by \`bun run build:skill\`."
              echo "Do not hand-edit it. Update the source templates in scripts/build-skill.ts"
              echo "and the command source files, then run \`bun run build:skill\` to regenerate."
            } >&2
            exit 1
          fi

          echo "No generated files hand-edited. OK."
