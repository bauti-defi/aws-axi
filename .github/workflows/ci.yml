name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Exact-pin check
        run: bun run check:pins

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Skill drift check
        run: bun run build:skill -- --check

      - name: Build distribution
        run: bun run build

      - name: Smoke test — bun bin version
        run: bun run dist/bin/aws-axi.js --version

      - name: Smoke test — bun bin help
        run: bun run dist/bin/aws-axi.js --help

      - name: Smoke test — dist shebang is #!/usr/bin/env bun
        run: |
          shebang=$(head -1 dist/bin/aws-axi.js)
          if [ "$shebang" != "#!/usr/bin/env bun" ]; then
            echo "ERROR: expected '#!/usr/bin/env bun', got '${shebang}'"
            exit 1
          fi
          echo "Shebang OK: ${shebang}"

      - name: Verify dist
        run: bun run verify:dist
