name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Exact-pin check
        run: bun run check:pins

      - name: Type check
        run: bun run typecheck

      - name: Build distribution
        run: bun run build

      - name: Test
        run: bun test

      - name: Smoke test — launcher version
        run: ./dist/bin/aws-axi --version

      - name: Smoke test — launcher help
        run: ./dist/bin/aws-axi --help

      - name: Verify dist
        run: bun run verify:dist
